<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Looking Inside the Compiler — Lab Worksheet</title>

<!-- Typography: display, body, mono, and Telugu -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+Telugu:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Code highlighting theme (dark, for the dark code blocks) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">

<style>
  :root{
    --bg:#F2F5FA;
    --card:#FFFFFF;
    --ink:#16202E;
    --muted:#586375;
    --accent:#1F5FE0;
    --accent-soft:#ECF2FE;
    --amber:#C8791B;
    --rule:#E5EAF2;
    --code-bg:#0d1117;
    --code-fg:#c9d1d9;
    --sans:'IBM Plex Sans','Noto Sans Telugu',system-ui,-apple-system,sans-serif;
    --display:'Space Grotesk','Noto Sans Telugu',system-ui,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace;
  }

  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    color:var(--ink);
    font-family:var(--sans);
    font-size:17px;
    line-height:1.7;
    background-color:var(--bg);
    /* signature: faint graph-paper ground, the worksheet floats above it */
    background-image:
      linear-gradient(rgba(31,95,224,.045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(31,95,224,.045) 1px, transparent 1px);
    background-size:28px 28px;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }

  /* ---------- sticky signpost bar (the pipeline) ---------- */
  .topbar{
    position:sticky; top:0; z-index:20;
    display:flex; align-items:center; gap:18px;
    flex-wrap:wrap;
    padding:11px clamp(16px,4vw,40px);
    background:rgba(255,255,255,.82);
    backdrop-filter:saturate(140%) blur(8px);
    -webkit-backdrop-filter:saturate(140%) blur(8px);
    border-bottom:1px solid var(--rule);
  }
  .brand{
    font-family:var(--mono);
    font-size:.72rem; letter-spacing:.14em; text-transform:uppercase;
    color:var(--muted); white-space:nowrap;
  }
  .pipeline{
    display:flex; align-items:center; gap:6px;
    overflow-x:auto; padding-bottom:2px;
  }
  .pipeline::-webkit-scrollbar{height:0;}
  .stage{
    font-family:var(--mono); font-size:.82rem; font-weight:500;
    color:var(--accent);
    background:var(--accent-soft);
    border:1px solid #D5E2FB;
    padding:3px 9px; border-radius:6px; white-space:nowrap;
  }
  .stage--focus{
    color:#fff; background:var(--accent); border-color:var(--accent);
    box-shadow:0 1px 0 rgba(31,95,224,.35);
  }
  .arrow{color:#A9B6C9; font-family:var(--mono); font-size:.9rem; user-select:none;}

  /* ---------- the lab sheet ---------- */
  main{padding:clamp(20px,4vw,52px) 16px 96px;}
  .sheet{
    max-width:880px; margin:0 auto;
    background:var(--card);
    border:1px solid var(--rule);
    border-radius:14px;
    box-shadow:0 1px 2px rgba(22,32,46,.04), 0 18px 40px -28px rgba(22,32,46,.28);
    padding:clamp(24px,5vw,64px);
  }

  /* ---------- rendered markdown ---------- */
  .md{opacity:0;}
  body.ready .md{opacity:1;}
  @media (prefers-reduced-motion:no-preference){
    .md{transition:opacity .5s ease;}
  }

  .md > :first-child{margin-top:0;}

  /* hero title = first h1 */
  .md h1{
    font-family:var(--display); font-weight:700;
    line-height:1.18; letter-spacing:-.015em;
    color:var(--ink);
  }
  .md h1:first-of-type{
    font-size:clamp(1.9rem,4.2vw,2.7rem);
    margin:0 0 .2em;
  }
  /* every later h1 is a Concept divider */
  .md h1:not(:first-of-type){
    font-size:clamp(1.5rem,3.2vw,2rem);
    margin-top:2.6em; padding-top:1.4em;
    border-top:1px solid var(--rule);
    position:relative;
  }
  .md h1:not(:first-of-type)::before{
    content:""; position:absolute; top:-1px; left:0;
    width:54px; height:3px; background:var(--accent); border-radius:2px;
  }

  .md h2{
    font-family:var(--display); font-weight:600;
    font-size:1.32rem; letter-spacing:-.01em;
    margin:2.2em 0 .7em; padding-left:14px;
    border-left:4px solid var(--accent);
  }
  .md h3{
    font-family:var(--display); font-weight:600;
    font-size:1.06rem; color:#243246;
    margin:1.8em 0 .5em;
  }

  .md p{margin:.85em 0;}
  .md strong{font-weight:600; color:var(--ink);}
  .md em{font-style:italic;}

  .md a{color:var(--accent); text-decoration:none; border-bottom:1px solid #Bcd2f7;}
  .md a:hover{border-bottom-color:var(--accent);}

  .md ul,.md ol{margin:.7em 0; padding-left:1.4em;}
  .md li{margin:.38em 0;}
  .md li::marker{color:var(--accent);}

  /* inline code */
  .md :not(pre) > code{
    font-family:var(--mono); font-size:.86em;
    background:#F1F4F9; color:#1c3a66;
    padding:.12em .42em; border-radius:5px;
    border:1px solid #E4EAF3;
    word-break:break-word;
  }
  .md h1 :not(pre) > code,
  .md h2 :not(pre) > code,
  .md h3 :not(pre) > code{
    font-size:.78em; background:var(--accent-soft);
    color:var(--accent); border-color:#D5E2FB;
  }

  /* code blocks (dark) */
  .md pre{
    background:var(--code-bg);
    color:var(--code-fg);
    border-radius:10px;
    padding:16px 18px;
    overflow-x:auto;
    margin:1.1em 0;
    font-size:.86rem; line-height:1.6;
    border:1px solid #1c2533;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.02);
  }
  .md pre code{
    font-family:var(--mono);
    background:transparent; color:inherit;
    padding:0; border:0; font-size:inherit;
    white-space:pre;
  }

  /* tables */
  .md table{
    width:100%; border-collapse:collapse;
    margin:1.2em 0; font-size:.95rem;
    border:1px solid var(--rule); border-radius:10px; overflow:hidden;
  }
  .md thead th{
    background:var(--accent-soft); color:#1b3a73;
    font-family:var(--display); font-weight:600; text-align:left;
    font-size:.9rem; letter-spacing:.01em;
  }
  .md th,.md td{
    padding:10px 14px; border-bottom:1px solid var(--rule);
    vertical-align:top;
  }
  .md tbody tr:nth-child(even){background:#FAFBFD;}
  .md tbody tr:last-child td{border-bottom:0;}
  .md td:first-child{white-space:nowrap;}
  /* the New Words table holds long Telugu in col 2 — let it wrap */
  .md td:last-child{white-space:normal;}

  /* horizontal rules between sections */
  .md hr{
    border:0; height:1px; background:var(--rule);
    margin:2.4em 0; position:relative;
  }
  .md hr::after{
    content:"›"; position:absolute; left:50%; top:50%;
    transform:translate(-50%,-50%);
    background:var(--card); color:#C2CDDC;
    font-family:var(--mono); padding:0 10px; font-size:.9rem;
  }

  /* ---------- status / error ---------- */
  .status{
    max-width:880px; margin:0 auto;
    font-family:var(--mono); font-size:.9rem; color:var(--muted);
    padding:18px 4px;
  }
  .errbox{
    max-width:880px; margin:0 auto;
    background:var(--card); border:1px solid var(--rule);
    border-left:4px solid var(--amber);
    border-radius:12px; padding:24px 28px;
  }
  .errbox h2{
    font-family:var(--display); font-size:1.25rem; margin:0 0 .5em; color:var(--ink);
  }
  .errbox p{margin:.6em 0; color:var(--muted);}
  .errbox code{font-family:var(--mono); background:#F1F4F9; padding:.1em .4em; border-radius:5px; color:#1c3a66;}
  .errbox pre{
    background:var(--code-bg); color:var(--code-fg);
    font-family:var(--mono); font-size:.85rem;
    padding:14px 16px; border-radius:9px; overflow-x:auto; margin:.9em 0;
  }

  /* page-load motion for the signpost chips */
  @media (prefers-reduced-motion:no-preference){
    .stage{opacity:0; transform:translateY(-4px); animation:drop .5s ease forwards;}
    .stage:nth-child(1){animation-delay:.05s}
    .stage:nth-child(3){animation-delay:.11s}
    .stage:nth-child(5){animation-delay:.17s}
    .stage:nth-child(7){animation-delay:.23s}
    .stage:nth-child(9){animation-delay:.29s}
    .stage:nth-child(11){animation-delay:.35s}
    @keyframes drop{to{opacity:1; transform:translateY(0);}}
  }

  :focus-visible{outline:2px solid var(--accent); outline-offset:2px; border-radius:3px;}

  @media (max-width:560px){
    body{font-size:16px;}
    .brand{display:none;}
  }
</style>
</head>
<body>
  <header class="topbar">
    <span class="brand">Compilation&nbsp;Pipeline · Lab</span>
    <nav class="pipeline" aria-label="Compilation pipeline stages">
      <span class="stage">.c</span><span class="arrow">›</span>
      <span class="stage stage--focus">.i</span><span class="arrow">›</span>
      <span class="stage stage--focus">.ll/.bc</span><span class="arrow">›</span>
      <span class="stage">.s</span><span class="arrow">›</span>
      <span class="stage">.o</span><span class="arrow">›</span>
      <span class="stage">exe</span>
    </nav>
  </header>

  <main>
    <div id="status" class="status" aria-live="polite">Rendering worksheet…</div>
    <article id="content" class="md sheet" hidden></article>
  </main>

  <!-- Markdown renderer + syntax highlighter, both from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>
    const MD_FILE = 'compilation_intermediate_files_worksheet.md';
    const statusEl = document.getElementById('status');
    const contentEl = document.getElementById('content');

    function showError(title, lines){
      statusEl.outerHTML =
        '<div class="errbox" role="alert"><h2>' + title + '</h2>' + lines.join('') + '</div>';
    }

    async function render(){
      if (!window.marked){
        showError('Markdown renderer didn\u2019t load',
          ['<p>The marked.js library couldn\u2019t be reached from the CDN. Check your internet connection and reload.</p>']);
        return;
      }
      marked.setOptions({ gfm:true, breaks:false });

      try{
        const res = await fetch(MD_FILE, { cache:'no-cache' });
        if(!res.ok) throw new Error('http-' + res.status);
        const md = await res.text();

        contentEl.innerHTML = marked.parse(md);

        // Highlight only blocks whose language is known; leave ASCII diagrams plain.
        contentEl.querySelectorAll('pre code').forEach(block => {
          const m = (block.className || '').match(/language-([\w-]+)/);
          const lang = m && m[1];
          if (lang && window.hljs && hljs.getLanguage(lang)){
            hljs.highlightElement(block);
          }
        });

        document.title = (contentEl.querySelector('h1')?.textContent || document.title).trim();
        statusEl.remove();
        contentEl.hidden = false;
        document.body.classList.add('ready');
      }catch(err){
        const isFile = location.protocol === 'file:';
        if (isFile){
          showError('Open this over a local server, not as a file',
            ['<p>Browsers block a page opened with <code>file://</code> from reading other local files, so the worksheet can\u2019t be fetched yet. Serve this folder over HTTP and reload:</p>',
             '<pre>cd path/to/this/folder\npython3 -m http.server 8000</pre>',
             '<p>Then open <code>http://localhost:8000/compilation_intermediate_files_worksheet.html</code></p>']);
        } else {
          showError('Worksheet file not found',
            ['<p>Couldn\u2019t load <code>' + MD_FILE + '</code> next to this page. Keep both files in the same folder, then reload.</p>']);
        }
      }
    }

    render();
  </script>
</body>
</html>
